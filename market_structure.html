<!DOCTYPE html>
<html>
<head>
<style>
body { background: #1a1a2e; color: white; font-family: Arial; padding: 20px; }
.container { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
.box { background: #16213e; padding: 30px; border-radius: 10px; width: 350px; }
h2 { text-align: center; margin-bottom: 20px; }
.bullish h2 { color: #10b981; }
.bearish h2 { color: #ef4444; }
svg { width: 100%; height: 200px; }
.label { font-size: 12px; font-weight: bold; }
</style>
</head>
<body>
<h1 style="text-align:center; color:#00d4ff;">Market Structure (시장 구조)</h1>

<div class="container">
  <div class="box bullish">
    <h2>📈 상승 구조 (Bullish)</h2>
    <svg viewBox="0 0 300 180">
      <!-- Line -->
      <polyline points="20,150 60,100 100,120 160,60 200,90 260,30" 
                fill="none" stroke="#10b981" stroke-width="3"/>
      <!-- Points -->
      <circle cx="60" cy="100" r="6" fill="#10b981"/>
      <circle cx="100" cy="120" r="6" fill="#10b981"/>
      <circle cx="160" cy="60" r="6" fill="#10b981"/>
      <circle cx="200" cy="90" r="6" fill="#10b981"/>
      <circle cx="260" cy="30" r="6" fill="#10b981"/>
      <!-- Labels -->
      <text x="50" y="90" class="label" fill="#fff">HL</text>
      <text x="90" y="140" class="label" fill="#fff">HL</text>
      <text x="150" y="50" class="label" fill="#00d4ff">HH</text>
      <text x="190" y="110" class="label" fill="#fff">HL</text>
      <text x="250" y="20" class="label" fill="#00d4ff">HH</text>
    </svg>
    <p style="text-align:center; color:#888; font-size:14px;">
      HH (Higher High) = 전고점 갱신<br>
      HL (Higher Low) = 전저점보다 높은 저점
    </p>
  </div>

  <div class="box bearish">
    <h2>📉 하락 구조 (Bearish)</h2>
    <svg viewBox="0 0 300 180">
      <!-- Line -->
      <polyline points="20,30 60,80 100,50 160,120 200,80 260,150" 
                fill="none" stroke="#ef4444" stroke-width="3"/>
      <!-- Points -->
      <circle cx="60" cy="80" r="6" fill="#ef4444"/>
      <circle cx="100" cy="50" r="6" fill="#ef4444"/>
      <circle cx="160" cy="120" r="6" fill="#ef4444"/>
      <circle cx="200" cy="80" r="6" fill="#ef4444"/>
      <circle cx="260" cy="150" r="6" fill="#ef4444"/>
      <!-- Labels -->
      <text x="50" y="100" class="label" fill="#00d4ff">LL</text>
      <text x="90" y="40" class="label" fill="#fff">LH</text>
      <text x="150" y="140" class="label" fill="#00d4ff">LL</text>
      <text x="190" y="70" class="label" fill="#fff">LH</text>
      <text x="250" y="170" class="label" fill="#00d4ff">LL</text>
    </svg>
    <p style="text-align:center; color:#888; font-size:14px;">
      LH (Lower High) = 전고점보다 낮은 고점<br>
      LL (Lower Low) = 전저점 갱신
    </p>
  </div>
</div>

<div style="margin-top:40px; text-align:center;">
  <h2 style="color:#f59e0b;">🔄 구조 전환 (CHoCH)</h2>
  <div class="box" style="margin:0 auto; width:400px;">
    <svg viewBox="0 0 350 180">
      <!-- Bullish to Bearish -->
      <polyline points="20,140 60,90 100,110 140,50 180,80 220,100 280,140" 
                fill="none" stroke="#888" stroke-width="2"/>
      <polyline points="140,50 180,80 220,100 280,140" 
                fill="none" stroke="#ef4444" stroke-width="3"/>
      <!-- Points -->
      <circle cx="60" cy="90" r="5" fill="#10b981"/>
      <circle cx="100" cy="110" r="5" fill="#10b981"/>
      <circle cx="140" cy="50" r="5" fill="#10b981"/>
      <circle cx="180" cy="80" r="5" fill="#f59e0b"/>
      <circle cx="220" cy="100" r="5" fill="#ef4444"/>
      <!-- Labels -->
      <text x="130" y="40" class="label" fill="#10b981">HH</text>
      <text x="170" y="70" class="label" fill="#f59e0b">LH</text>
      <text x="200" y="120" class="label" fill="#ef4444">CHoCH!</text>
      <text x="265" y="155" class="label" fill="#ef4444">LL</text>
    </svg>
    <p style="text-align:center; color:#888; font-size:14px;">
      상승 중 LH 형성 → HL 깨짐 = <span style="color:#f59e0b;">CHoCH (전환 신호)</span>
    </p>
  </div>
</div>

</body>
</html>
