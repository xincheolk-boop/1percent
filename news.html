<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 - 1% Trading</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0f'/><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2300b8d9'/><stop offset='100%25' stop-color='%239333ea'/></linearGradient></defs><text x='16' y='22' text-anchor='middle' font-size='16' font-weight='900' fill='url(%23g)' font-family='monospace'>1%25</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --accent-cyan: #00b8d9;
            --accent-purple: #9333ea;
            --accent-green: #009985;
            --accent-red: #dc2626;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 1000;
        }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .back-btn:hover { color: var(--accent-cyan); background: var(--bg-card); }
        .top-title {
            margin-left: 16px;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 24px 40px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .page-header p { font-size: 14px; color: var(--text-secondary); }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active { background: var(--bg-card); color: var(--accent-cyan); font-weight: 600; }
        .tab:hover { color: var(--text-primary); }
        .news-list { display: flex; flex-direction: column; gap: 16px; }
        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .news-item:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.15); }
        .news-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .news-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }
        .news-tag.market { background: rgba(0,184,217,0.15); color: var(--accent-cyan); }
        .news-tag.exchange { background: rgba(0,153,133,0.15); color: var(--accent-green); }
        .news-tag.regulation { background: rgba(220,38,38,0.15); color: var(--accent-red); }
        .news-tag.defi { background: rgba(147,51,234,0.15); color: var(--accent-purple); }
        .news-date { font-size: 11px; color: var(--text-muted); }
        .news-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.5; }
        .news-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .live-badge {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 4px;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <script src="site-header.js"></script>

    <div class="container">
        <div class="page-header">
            <h1><span class="live-badge"></span> 실시간 뉴스</h1>
            <p>암호화폐 시장의 최신 소식을 빠르게 전달합니다</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-cat="all" onclick="filterNews(this)">전체</div>
            <div class="tab" data-cat="market" onclick="filterNews(this)">시장분석</div>
            <div class="tab" data-cat="exchange" onclick="filterNews(this)">거래소</div>
            <div class="tab" data-cat="regulation" onclick="filterNews(this)">규제</div>
            <div class="tab" data-cat="defi" onclick="filterNews(this)">DeFi</div>
        </div>

        <div class="news-list" id="newsList">
            <div style="text-align:center;padding:60px 0;color:var(--text-muted);font-size:14px">뉴스 불러오는 중…</div>
        </div>
        <div id="newsUpdated" style="text-align:center;margin-top:20px;color:var(--text-muted);font-size:11px"></div>
    </div>
    <script>
        let CURRENT_CAT = 'all';
        let NEWS_CACHE = [];

        function categorize(item){
            const cats = ((item.categories||'') + '|' + (item.title||'')).toLowerCase();
            if (/regulation|sec|cftc|law|government|ban|규제/.test(cats)) return 'regulation';
            if (/defi|dex|uniswap|aave|curve|lending|yield/.test(cats)) return 'defi';
            if (/exchange|binance|bitget|bybit|okx|gate|coinbase|kraken|upbit/.test(cats)) return 'exchange';
            return 'market';
        }
        const CAT_LABEL = { market:'시장분석', exchange:'거래소', regulation:'규제', defi:'DeFi' };

        function formatTime(ts){
            const d = new Date(ts*1000);
            const y = d.getFullYear(), mo = String(d.getMonth()+1).padStart(2,'0'), da = String(d.getDate()).padStart(2,'0');
            const h = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
            return `${y}.${mo}.${da} ${h}:${mi}`;
        }

        function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        function render(){
            const list = document.getElementById('newsList');
            const filtered = CURRENT_CAT==='all' ? NEWS_CACHE : NEWS_CACHE.filter(n=>n._cat===CURRENT_CAT);
            if (!filtered.length){
                list.innerHTML = `<div style="text-align:center;padding:60px 0;color:var(--text-muted);font-size:14px">해당 카테고리 뉴스가 없습니다</div>`;
                return;
            }
            list.innerHTML = filtered.map(n => {
                const cat = n._cat;
                const title = escapeHtml(n.title||'');
                const body = escapeHtml((n.body||'').replace(/\s+/g,' ').slice(0,180)) + ((n.body||'').length>180?'…':'');
                const url = n.url||'#';
                return `<div class="news-item" onclick="window.open('${url}','_blank')">
                    <div class="news-meta">
                        <span class="news-tag ${cat}">${CAT_LABEL[cat]}</span>
                        <span class="news-date">${formatTime(n.published_on)}</span>
                    </div>
                    <div class="news-title">${title}</div>
                    <div class="news-desc">${body}</div>
                </div>`;
            }).join('');
        }

        async function fetchNews(){
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                if (!data || !data.Data) throw new Error('no data');
                NEWS_CACHE = data.Data.map(n => Object.assign({_cat: categorize(n)}, n));
                render();
                const d = new Date();
                document.getElementById('newsUpdated').textContent =
                    `마지막 업데이트: ${d.toLocaleString('ko-KR')} · 5분마다 자동 갱신`;
            } catch(e){
                console.warn('news fetch fail', e);
                document.getElementById('newsList').innerHTML =
                    `<div style="text-align:center;padding:60px 0;color:var(--accent-red);font-size:13px">뉴스 로드 실패. 잠시 후 다시 시도해주세요.</div>`;
            }
        }

        function filterNews(el) {
            CURRENT_CAT = el.getAttribute('data-cat');
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        fetchNews();
        setInterval(fetchNews, 300000);
    </script>
</body>
</html>
