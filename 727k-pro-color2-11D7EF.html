<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>색상 비교 - #11D7EF</title>
    <style>
        body {
            background: #0d0d12;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 40px;
        }
        h1 { color: #11D7EF; }
        .box {
            width: 200px;
            height: 200px;
            background: #11D7EF;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: #000;
        }
        .exchange-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #11D7EF, #00B8D4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
        }
        .label { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>#11D7EF (하늘색/시안)</h1>
    <div class="box">BG</div>
    <div class="exchange-logo">BG</div>
    <p class="label">Bitget 로고 색상 테스트</p>
</body>
</html>
